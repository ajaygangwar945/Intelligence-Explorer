<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" role="img" aria-label="Intelligence Explorer banner">
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="45%" stop-color="#312e81" />
      <stop offset="75%" stop-color="#be185d" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <pattern id="dot-grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#ffffff" fill-opacity="0.16" />
    </pattern>
    <linearGradient id="pill-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <rect width="1600" height="560" fill="url(#banner-bg)" />
  <rect width="1600" height="560" fill="url(#dot-grid)" />

  <circle cx="1400" cy="90" r="130" fill="#ffffff" fill-opacity="0.08" />
  <circle cx="150" cy="480" r="180" fill="#ffffff" fill-opacity="0.07" />
  <circle cx="1200" cy="470" r="220" fill="#ffffff" fill-opacity="0.05" />

  <g stroke="#ffffff" stroke-opacity="0.65" stroke-width="3" fill="none">
    <path d="M1040 130 L1180 220 L1320 170 L1450 280 L1260 360 L1100 320 Z" />
    <path d="M1180 220 L1260 360" />
    <path d="M1320 170 L1260 360" />
    <path d="M1450 280 L1320 170" />
  </g>
  <g fill="#ffffff">
    <circle cx="1040" cy="130" r="8" />
    <circle cx="1180" cy="220" r="8" />
    <circle cx="1320" cy="170" r="8" />
    <circle cx="1450" cy="280" r="8" />
    <circle cx="1260" cy="360" r="8" />
    <circle cx="1100" cy="320" r="8" />
  </g>

  <text x="96" y="190" font-size="76" font-weight="800" fill="#ffffff" font-family="Outfit, Segoe UI, Arial, sans-serif">Intelligence Explorer</text>
  <text x="96" y="254" font-size="34" font-weight="500" fill="#f8fafc" font-family="Outfit, Segoe UI, Arial, sans-serif">A vibrant AI learning dashboard for core and advanced topics</text>

  <rect x="96" y="312" width="640" height="74" rx="18" fill="url(#pill-gradient)" />
  <text x="130" y="360" font-size="30" font-weight="700" fill="#ffffff" font-family="Outfit, Segoe UI, Arial, sans-serif">Live: intelligence-explorer.vercel.app</text>

  <text x="96" y="442" font-size="26" font-weight="500" fill="#e2e8f0" font-family="Outfit, Segoe UI, Arial, sans-serif">CNN  |  Generative AI  |  AI and ML Foundations  |  LLMs  |  NLP  |  Prompt Engineering</text>
</svg>
